model_type: gat
hidden_dim: 128
reject_init_bias: -3.0
gat_heads: 4
gat_layers: 2

action_mask:
  enabled: true

preemption:
  enabled: true

ppo:
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  learning_rate: 0.0003
  reward_scale: 0.002
  max_grad_norm: 0.5
  rollout_steps: 1024
  update_epochs: 4
  minibatch_size: 256
  total_timesteps: 200000
